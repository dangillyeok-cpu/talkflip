<style>

/* ===== Availability (mirror ContentStore.swift) ===== */
function defaultRange(type){
  return (type==="vote"||type==="taboo") ? [3,8] : [1,8];
}
function resolvedRange(card, deck){
  const d = defaultRange(card.cardType);
  const min = Math.max(card.minPlayers ?? d[0], deck.minPlayers ?? 1);
  const max = Math.min(card.maxPlayers ?? d[1], deck.maxPlayers ?? 8);
  return [min,max];
}
function cardsFor(mode, deck, players){
  return CARDS.filter(c =>
    c.deck === deck.id &&
    c.modes.includes(mode) &&
    (()=>{ const r = resolvedRange(c, deck); return players >= r[0] && players <= r[1]; })()
  );
}
function verdict(mode, count, deck, players){
  if(deck.id==="couple" && players!==2) return {kind:"disabled", reason:"coupleOnly", playable:false};
  if((mode==="whos_most_likely"||mode==="taboo_round") && players<3) return {kind:"disabled", reason:"needThreePlus", playable:false};
  if(mode==="hot_seat"){
    if(count>=18) return {kind:"normal", playable:true};
    if(count>=12) return {kind:"shortRound", playable:true};
    return {kind:"disabled", reason:"notEnoughCards", playable:false};
  }
  if(mode==="this_or_that"){
    if(count>=8) return {kind:"normal", playable:true};
    if(count>=5) return {kind:"quickRound", playable:true};
    return {kind:"disabled", reason:"notEnoughCards", playable:false};
  }
  // classic_flip, whos_most_likely, taboo_round
  if(count>=8) return {kind:"normal", playable:true};
  if(count>=6) return {kind:"smallDeck", playable:true};
  return {kind:"disabled", reason:"notEnoughCards", playable:false};
}
function availability(mode, players){
  return DECKS.map(deck => {
    const pool = cardsFor(mode, deck, players);
    return { deck, cardCount: pool.length, verdict: verdict(mode, pool.length, deck, players) };
  });
}

/* ===== Stats store (mirror CardStatsStore.swift, localStorage) ===== */
const STATS_KEY = "talkflip.cardStats.v1";
const FAV_KEY = "talkflip.favoriteIDs.v1";
const Stats = {
  stats: JSON.parse(localStorage.getItem(STATS_KEY) || "{}"),
  favs: new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")),
  _saveStats(){ localStorage.setItem(STATS_KEY, JSON.stringify(this.stats)); },
  _saveFavs(){ localStorage.setItem(FAV_KEY, JSON.stringify([...this.favs])); },
  _ensure(id){ if(!this.stats[id]) this.stats[id] = {shown:0,passed:0,favorited:0,shared:0}; return this.stats[id]; },
  recordShown(id){ this._ensure(id).shown++; this._saveStats(); },
  recordPassed(id){ this._ensure(id).passed++; this._saveStats(); },
  recordShared(id){ const s=this._ensure(id); s.shared=(s.shared||0)+1; this._saveStats(); },
  toggleFavorite(id){
    if(this.favs.has(id)){ this.favs.delete(id); this._saveFavs(); return false; }
    this.favs.add(id); this._ensure(id).favorited++; this._saveStats(); this._saveFavs(); return true;
  },
  isFavorite(id){ return this.favs.has(id); },
  totals(){ let shown=0,passed=0,shared=0; for(const v of Object.values(this.stats)){ shown+=v.shown||0; passed+=v.passed||0; shared+=v.shared||0; } return {shown,passed,shared}; }
};

/* ===== Haptics (best-effort on supporting devices) ===== */
function haptic(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

/* ===== Game session (mirror Session.swift) ===== */
const QUICK = 5;
class GameSession {
  constructor(mode, deck, language, players, cards, isQuickRound){
    this.mode = mode; this.deck = deck; this.language = language; this.players = players;
    this.isQuickRound = isQuickRound;
    this.allCards = shuffle([...cards]);
    this.dealOffset = 0;
    if(isQuickRound){
      this.cards = this.allCards.slice(0, QUICK);
      this.dealOffset = this.cards.length;
    } else {
      this.cards = this.allCards;
    }
    this.currentIndex = 0; this.shownCount = 0; this.answeredInHotSeat = 0;
    this.hotSeatTurn = 1; this.score = 0; this.penalties = 0;
    this.tabooSecondsLeft = 30; this.showFollow = false;
    this.seenOrder = []; this.seenIds = new Set(); this.passedCount = 0; this.sessionFavs = new Set();
  }
  markSeen(id){ if(!this.seenIds.has(id)){ this.seenIds.add(id); this.seenOrder.push(id); } }
  get currentCard(){ return this.currentIndex < this.cards.length ? this.cards[this.currentIndex] : null; }
  get isComplete(){ return this.currentCard === null; }
  get canPlayAnotherQuickRound(){ return this.isQuickRound && this.allCards.length > QUICK; }
  get progressText(){ return `${Math.min(this.currentIndex+1, this.cards.length)} / ${this.cards.length}`; }
  _deferToBack(){
    if(this.currentIndex >= this.cards.length) return;
    const c = this.cards.splice(this.currentIndex,1)[0];
    this.cards.push(c);
  }
  next(){
    this.showFollow = false; this._resetTaboo(); this.shownCount++; this.currentIndex++;
    if(this.mode==="hot_seat"){
      this.answeredInHotSeat++;
      if(this.answeredInHotSeat>=2){ this.answeredInHotSeat=0; this.hotSeatTurn++; this._deferToBack(); }
    }
  }
  pass(){ this.passedCount++; this.showFollow=false; this._resetTaboo(); this._deferToBack(); }
  tick(){ if(this.mode==="taboo_round" && this.tabooSecondsLeft>0) this.tabooSecondsLeft--; }
  addPoint(){ this.score++; this.next(); }
  addPenalty(){ this.penalties++; this.next(); }
  restart(){
    if(this.isQuickRound){
      if(this.dealOffset>=this.allCards.length){ this.allCards=shuffle(this.allCards); this.dealOffset=0; }
      const end = Math.min(this.dealOffset+QUICK, this.allCards.length);
      this.cards = this.allCards.slice(this.dealOffset, end);
      this.dealOffset = end;
    } else {
      this.allCards = shuffle(this.allCards); this.cards = this.allCards;
    }
    this.currentIndex=0; this.shownCount=0; this.answeredInHotSeat=0; this.hotSeatTurn=1;
    this.score=0; this.penalties=0; this.tabooSecondsLeft=30; this.showFollow=false;
    this.seenOrder=[]; this.seenIds=new Set(); this.passedCount=0; this.sessionFavs=new Set();
  }
  _resetTaboo(){ if(this.mode==="taboo_round") this.tabooSecondsLeft=30; }
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

const state = {
  language: "ko", players: 3, mode: "whos_most_likely", deckId: null,
  session: null, heroIndex: 0, timerHandle: null, onboardStep: 0

const root = document.getElementById("phone");
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function deckName(deck){ return state.language==="en" ? deck.name.en : deck.name.ko; }
function deckDesc(deck){ return state.language==="en" ? deck.description.en : deck.description.ko; }

function firstPlayableDeck(){
  const a = availability(state.mode, state.players).find(x => x.verdict.playable);
  return a ? a.deck.id : null;
}
function selectedAvailability(){
  if(!state.deckId) return null;
  return availability(state.mode, state.players).find(x => x.deck.id === state.deckId);
}

const ONBOARD_KEY = "talkflip.onboarded.v1";
function renderOnboarding(){
  const t = UIText(state.language);
  const steps = t.onboard;
  const i = Math.min(state.onboardStep || 0, steps.length - 1);
  const s = steps[i];
  const arts = [
    `<div class="ob-art">${BRAND_MARK}</div>`,
    `<div class="ob-art"><div class="ob-circle">${svgIcon('grid',46)}</div></div>`,
    `<div class="ob-art"><div class="ob-circle">${svgIcon('heart',36)}${svgIcon('send',36)}</div></div>`
  ];
  root.innerHTML = `
    <div class="onboard">
      <button class="ob-skip" id="obSkip">${esc(t.obSkip)}</button>
      <div class="ob-main">
        ${arts[i]}
        <h2 class="ob-title">${esc(s.title)}</h2>
        <p class="ob-text">${esc(s.body)}</p>
      </div>
      <div class="ob-foot">
        <div class="ob-dots">${steps.map((_,k)=>`<span class="${k===i?'on':''}"></span>`).join("")}</div>
        <button class="btn-start" id="obNext"><span class="bs-main">${i<steps.length-1?esc(t.obNext):esc(t.obStart)}</span></button>
      </div>

  document.getElementById("obSkip").onclick = () => { haptic(8); finishOnboarding(); };

    else finishOnboarding();
  };
}
function finishOnboarding(){
  try { localStorage.setItem(ONBOARD_KEY, "1"); } catch(e){}
  renderSetup();
}

function quickStart(){
  const modes = ["whos_most_likely","this_or_that","classic_flip","hot_seat","taboo_round"];
  const decks = ["spicy","funny","party","warm_up","couple","deep"];
  for(const m of modes){
    const av = availability(m, state.players);
    for(const dId of decks){
      const it = av.find(x => x.deck.id === dId && x.verdict.playable);
      if(it){ state.mode = m; state.deckId = dId; quickStartGo(); return; }
    }
  }
  for(const m of modes){
    const it = availability(m, state.players).find(x => x.verdict.playable);
    if(it){ state.mode = m; state.deckId = it.deck.id; quickStartGo(); return; }
  }
}
function quickStartGo(){ haptic(15); startGame(); }

  document.querySelectorAll("#deckList .deckrow").forEach(b => {
    const go = () => { if(b.dataset.pl !== "true") return; haptic(8); state.deckId = b.dataset.d; renderSetup(); };
    b.onclick = go;
    b.onkeydown = e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); go(); } };
  });
  document.getElementById("startBtn").onclick = startGame;
}

function ensureDeck(){
  const sel = selectedAvailability();
  if(!sel || !sel.verdict.playable) state.deckId = firstPlayableDeck();
}

function startGame(){
  const sel = selectedAvailability();
  if(!sel) return;
  const cards = cardsFor(state.mode, sel.deck, state.players);
  const isQuick = sel.verdict.kind === "quickRound";
  haptic(15);
  state.session = new GameSession(state.mode, sel.deck, state.language, state.players, cards, isQuick);
  renderGame();
  startTimer();
}

function startTimer(){
  stopTimer();
  state.timerHandle = setInterval(() => {
    const s = state.session;
    if(!s || s.mode !== "taboo_round") return;
    const before = s.tabooSecondsLeft;
    s.tick();
    if(before > 0 && s.tabooSecondsLeft === 0) haptic([20,40,20]);
    const el = document.getElementById("timer");
    if(el){
      const t = UIText(s.language);
      el.textContent = s.tabooSecondsLeft === 0 ? t.timesUp : s.tabooSecondsLeft + "s";
      el.style.color = (s.tabooSecondsLeft === 0 || s.tabooSecondsLeft <= 5) ? "#ffd60a" : "#fff";
    }
  }, 1000);
}
function stopTimer(){ if(state.timerHandle){ clearInterval(state.timerHandle); state.timerHandle = null; } }

/* ===== Render: game ===== */
function renderGame(){
  const s = state.session;
  const t = UIText(s.language);

  if(s.isComplete){ renderComplete(); return; }
  const card = s.currentCard;
  Stats.recordShown(card.id);
  s.markSeen(card.id);

  const grad = GRADIENTS[card.cardType] || GRADIENTS.answer;
  const isTaboo = card.cardType === "taboo";

  let body = `<div class="game">
    <div class="gtop">
      <button class="round-icon" id="closeBtn" aria-label="${esc(t.close)}">${svgIcon('close',18)}</button>
      <div class="progress">
        ${s.mode==="hot_seat" ? `<span>${esc(t.turnLabel(s.hotSeatTurn))}</span>` : ""}
        <span>${esc(s.progressText)}</span>
      </div>
      <button class="round-icon" id="recapBtn" aria-label="${esc(t.recap)}">${svgIcon('send',17)}</button>
    </div>
    <div class="gamecard" id="gameCard" style="background:linear-gradient(140deg, ${grad[0]}, ${grad[1]});">
      <div class="modetag">${esc((t.ko?MODE_KO:MODE_TITLE)[s.mode])}</div>
      ${s.mode==="taboo_round" ? `<div class="timer" id="timer">${s.tabooSecondsLeft}s</div>` : ""}
      ${s.language!=="en" ? `<div class="qko">${esc(card.ko)}</div>` : ""}
      ${s.language!=="ko" ? `<div class="qen" style="${s.language==='both'?'opacity:0.85;':''}">${esc(card.en)}</div>` : ""}
      ${isTaboo ? `<div class="banned-label">${esc(t.bannedWords)}</div>
        <div class="banned">${(s.language==="en"?card.bannedEn:card.bannedKo||[]).map(w=>`<span class="chip">${esc(w)}</span>`).join("")}</div>` : ""}
      ${s.showFollow && card.follow ? `<div class="follow">${esc(s.language==="en"?card.follow.en:card.follow.ko)}</div>` : ""}
      <div class="ghost">FLIP</div>
    </div>
    ${FILMABLE.has(s.mode) ? `<div class="filmnudge">${esc(t.filmNudge)}</div>` : ""}
    ${s.currentIndex===0 ? `<div class="turnhint">${esc(t.turnHint)}</div>` : ""}
    <div class="controls" id="controls"></div>
  </div>`;
  root.innerHTML = body;

  document.getElementById("closeBtn").onclick = exitGame;
  const rb = document.getElementById("recapBtn"); if(rb) rb.onclick = () => { haptic(8); openRecap(s); };
  renderControls(card);
}

function renderControls(card){
  const s = state.session, t = UIText(s.language);
  const c = document.getElementById("controls");
  const actionRow = `<div class="actionbar">
      <button class="btn bordered" id="favCard">${svgIcon(Stats.isFavorite(card.id)?'heart_fill':'heart',16)} ${esc(Stats.isFavorite(card.id)?t.saved:t.save)}</button>
      <button class="btn bordered" id="shareCard">${svgIcon('send',16)} ${esc(t.share)}</button>
    </div>`;

  if(s.mode === "taboo_round"){
    c.innerHTML = actionRow + `
      <div class="row">
        <span class="pill" style="background:rgba(52,199,89,0.15);color:#34c759;">${esc(t.scoreLabel)} ${s.score}</span>
        <span class="pill" style="background:rgba(255,59,48,0.15);color:#ff3b30;">${esc(t.penaltyLabel)} ${s.penalties}</span>
      </div>
      <div class="row">
        <button class="btn bordered" id="caught">${svgIcon('close',16)} ${esc(t.caught)}</button>
        <button class="btn prominent" id="cleared">${svgIcon('check',16)} ${esc(t.cleared)}</button>
      </div>`;
    document.getElementById("caught").onclick = () => { haptic([10,30,10]); flipNext(() => s.addPenalty()); };
    document.getElementById("cleared").onclick = () => { haptic(15); flipNext(() => s.addPoint()); };
  } else {
    const followBtn = card.follow ? `<button class="btn ghost" id="followBtn">${s.showFollow?esc(t.hideFollow):esc(t.showFollow)}</button>` : "";
    c.innerHTML = actionRow + followBtn + `
      <div class="row">
        <button class="btn bordered" id="passBtn">${esc(t.pass)}</button>
        <button class="btn prominent" id="nextBtn">${esc(t.primaryAction(s.mode, s.answeredInHotSeat))} →</button>
      </div>`;
    if(card.follow) document.getElementById("followBtn").onclick = () => { s.showFollow = !s.showFollow; renderGame(); };
    document.getElementById("passBtn").onclick = () => { haptic(8); Stats.recordPassed(card.id); flipNext(() => s.pass()); };
    document.getElementById("nextBtn").onclick = () => { flipNext(() => s.next()); };
  }

  document.getElementById("favCard").onclick = () => {
    haptic(8);
    const nowFav = Stats.toggleFavorite(card.id);

    renderControls(card);

}

function flipNext(action){
  haptic(12);
  const el = document.getElementById("gameCard");
  if(el) el.classList.add("flip");
  setTimeout(() => { action(); renderGame(); }, 170);
}

/* ===== Share image (canvas render of ShareCardSnapshot) ===== */
function makeShareCanvas(card, language, mode){
  const W=1080, H=1600;
  const cv = document.createElement("canvas"); cv.width=W; cv.height=H;
  const ctx = cv.getContext("2d");
  const grad = GRADIENTS[card.cardType] || GRADIENTS.answer;
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0, grad[0]); g.addColorStop(1, grad[1]);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#fff";

  // header
  ctx.textBaseline = "top";
  ctx.font = "900 54px -apple-system, sans-serif";
  ctx.fillText("TalkFlip", 78, 78);
  ctx.globalAlpha = 0.72; ctx.font = "800 26px -apple-system, sans-serif";
  ctx.fillText((language==="en"?MODE_TITLE:MODE_KO)[mode].toUpperCase(), 78, 146);
  ctx.globalAlpha = 1;

  // question text (centered vertical block)
  const ko = language !== "en";
  const en = language !== "ko";
  let y = 470;
  const wrap = (text, font, maxW) => {
    ctx.font = font;
    const words = text.split(/(\s+)/);
    const lines = []; let line = "";
    for(const w of words){
      if(ctx.measureText(line + w).width > maxW && line){ lines.push(line.trimEnd()); line = w.trimStart(); }
      else line += w;
    }
    if(line.trim()) lines.push(line.trim());
    return lines;
  };
  const drawLines = (lines, font, lh, alpha) => {
    ctx.font = font; ctx.globalAlpha = alpha;
    for(const l of lines){ ctx.fillText(l, 78, y); y += lh; }
    ctx.globalAlpha = 1;
  };
  if(ko){ drawLines(wrap(card.ko, "900 78px -apple-system, sans-serif", W-156), "900 78px -apple-system, sans-serif", 96, 1); y += 20; }
  if(en){ const f = language==="both" ? "900 50px -apple-system, sans-serif" : "900 76px -apple-system, sans-serif"; drawLines(wrap(card.en, f, W-156), f, language==="both"?64:92, language==="both"?0.85:1); }

  // banned words for taboo
  if(card.cardType === "taboo"){
    y += 30; ctx.globalAlpha = 0.7; ctx.font = "900 24px -apple-system, sans-serif";
    ctx.fillText(ko ? "금지어" : "BANNED WORDS", 78, y); ctx.globalAlpha = 1; y += 44;
    const words = (language==="en"?card.bannedEn:card.bannedKo) || [];
    let x = 78; ctx.font = "900 32px -apple-system, sans-serif";
    for(const w of words){
      const tw = ctx.measureText(w).width + 48;
      if(x + tw > W-78){ x = 78; y += 70; }
      ctx.globalAlpha = 0.18; roundRect(ctx, x, y, tw, 56, 28); ctx.fill(); ctx.globalAlpha = 1;
      ctx.fillText(w, x+24, y+12); x += tw + 16;
    }
  }

  drawInstallFooter(ctx, W, H, language);
  return cv;
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// shared canvas helpers
function drawInstallFooter(ctx, W, H, language){
  const ctaY = H - 220;
  ctx.globalAlpha = 0.82; ctx.font = "700 30px -apple-system, sans-serif";
  ctx.fillText(language==="en" ? "Tag a friend and play 👇" : "친구 태그하고 같이 해봐 👇", 78, ctaY);
  ctx.font = "900 40px -apple-system, sans-serif";
  const urlText = "▶ " + SHARE_URL;
  const pillW = ctx.measureText(urlText).width + 56;
  ctx.globalAlpha = 0.22; roundRect(ctx, 78, ctaY + 48, pillW, 78, 39); ctx.fill();
  ctx.globalAlpha = 1; ctx.fillText(urlText, 78 + 28, ctaY + 48 + 19);
  ctx.font = "900 34px -apple-system, sans-serif";
  const tag = "#TalkFlip"; ctx.fillText(tag, W - 78 - ctx.measureText(tag).width, H - 92);
}
function wrapText(ctx, text, font, maxW){
  ctx.font = font;
  const words = String(text).split(/(\s+)/);
  const lines = []; let line = "";
  for(const w of words){
    if(ctx.measureText(line + w).width > maxW && line){ lines.push(line.trimEnd()); line = w.trimStart(); }
    else line += w;
  }
  if(line.trim()) lines.push(line.trim());
  return lines;
}

function makeRecapCanvas(session){
  const W=1080, H=1600;
  const cv = document.createElement("canvas"); cv.width=W; cv.height=H;
  const ctx = cv.getContext("2d");
  const lang = session.language;
  const t = UIText(lang);
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0, "#7b2ff7"); g.addColorStop(1, "#f5067f");
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#fff"; ctx.textBaseline = "top";

  // header
  ctx.font = "900 54px -apple-system, sans-serif"; ctx.fillText("TalkFlip", 78, 78);
  ctx.globalAlpha = 0.72; ctx.font = "800 26px -apple-system, sans-serif";
  const deck = session.deck;
  const sub = (lang==="en" ? deck.name.en : deck.name.ko) + " · " + ((lang==="en"?MODE_TITLE:MODE_KO)[session.mode] || "").toUpperCase();
  ctx.fillText(sub, 78, 146); ctx.globalAlpha = 1;

  // headline
  ctx.font = "900 84px -apple-system, sans-serif"; ctx.fillText(t.recapHeadline, 78, 230);

  // stats
  let y = 360;
  ctx.font = "800 38px -apple-system, sans-serif"; ctx.globalAlpha = 0.95;
  ctx.fillText(`${t.playedLabel}: ${session.seenOrder.length}     ${t.passesLabel}: ${session.passedCount}`, 78, y);
  y += 64;
  if(session.mode === "taboo_round"){
    ctx.fillText(`${t.scoreLabel}: ${session.score}     ${t.penaltyLabel}: ${session.penalties}`, 78, y);
    y += 64;
  }
  ctx.globalAlpha = 1;

  // picks
  y += 36;
  ctx.globalAlpha = 0.72; ctx.font = "900 30px -apple-system, sans-serif";
  ctx.fillText(t.picksTitle.toUpperCase(), 78, y); ctx.globalAlpha = 1; y += 60;

  let picks = [...session.sessionFavs].map(id => CARDS.find(c => c.id === id)).filter(Boolean);
  if(picks.length === 0){
    picks = session.seenOrder.slice(-3).map(id => CARDS.find(c => c.id === id)).filter(Boolean);
  }
  picks = picks.slice(0, 4);

  const pickText = c => lang === "en" ? c.en : c.ko;
  const maxW = W - 200;
  const lh = 56;
  if(picks.length === 0){
    ctx.font = "600 36px -apple-system, sans-serif"; ctx.globalAlpha = 0.85;
    for(const l of wrapText(ctx, t.noPicksLine, "600 36px -apple-system, sans-serif", maxW)){ ctx.fillText(l, 78, y); y += lh; }
    ctx.globalAlpha = 1;
  } else {
    picks.forEach((c, i) => {
      ctx.font = "900 44px -apple-system, sans-serif"; ctx.globalAlpha = 0.5;
      ctx.fillText(`${i+1}`, 78, y); ctx.globalAlpha = 1;
      const lines = wrapText(ctx, pickText(c), "800 42px -apple-system, sans-serif", maxW);
      ctx.font = "800 42px -apple-system, sans-serif";
      lines.forEach(l => { ctx.fillText(l, 150, y); y += lh; });
      y += 22;
    });
  }

  drawInstallFooter(ctx, W, H, lang);
  return cv;
}

function showImageShareModal(url, title, filename, shareText){
  const t = UIText(state.language);
  const overlay = document.createElement("div");
  overlay.className = "modal-bg";
  overlay.innerHTML = `<div class="modal">
    <div class="mhead"><span class="t">${esc(title)}</span><button id="shClose">${esc(t.done)}</button></div>
    <div class="mbody"><div id="shareCanvasWrap">
      <img src="${url}" alt="share card"/>
      <div class="srow">
        <button class="btn prominent" id="shSys">${esc(t.share)}</button>
        <button class="btn bordered" id="shDl">${esc(t.download)}</button>
      </div>
    </div></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#shClose").onclick = () => overlay.remove();
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
  overlay.querySelector("#shDl").onclick = () => { const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); };
  overlay.querySelector("#shSys").onclick = async () => {
    try {
      const blob = await (await fetch(url)).blob();
      const file = new File([blob], "talkflip.png", {type:"image/png"});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], text:"#TalkFlip"});
      } else if(navigator.share){
        await navigator.share({text: shareText});
      } else {
        alert(t.ko ? "이 브라우저는 시스템 공유를 지원하지 않아요. ‘이미지 저장’을 사용하세요." : "System share not supported. Use Download.");
      }
    } catch(e){ /* user canceled */ }
  };
}

function openShare(card, language, mode){
  Stats.recordShared(card.id);
  const cv = makeShareCanvas(card, language, mode);
  showImageShareModal(cv.toDataURL("image/png"), UIText(state.language).share,
    "talkflip_" + card.id + ".png", (language==="en"?card.en:card.ko) + " #TalkFlip");
}

function openRecap(session){
  const cv = makeRecapCanvas(session);
  showImageShareModal(cv.toDataURL("image/png"), UIText(state.language).recap,
    "talkflip_recap.png", "#TalkFlip");
}

/* ===== Ads ===== */
let _adsReady = false;
let _lastInterstitial = 0;
function initAds(){
  if(!ADSENSE_CLIENT || ADSENSE_CLIENT.indexOf("ca-pub-") !== 0) return; // disabled / not configured
  try {
    // adsbygoogle.js is loaded via the static <head> snippet; just enable ad breaks.
    window.adsbygoogle = window.adsbygoogle || [];
    window.adsbygoogle.push({ preloadAdBreaks: "on" });
    _adsReady = true;
  } catch(e){ _adsReady = false; }
}
function _adBreak(o){ try { (window.adsbygoogle = window.adsbygoogle || []).push(o); } catch(e){ if(o.afterAd) o.afterAd(); } }
// Interstitial at a natural break (session end). Frequency-capped; never blocks if ads are off.
function showInterstitial(name, done){
  done = done || function(){};
  const now = Date.now();
  if(!_adsReady || now - _lastInterstitial < INTERSTITIAL_COOLDOWN_MS){ done(); return; }
  _lastInterstitial = now;
  _adBreak({ type: "next", name: name || "interstitial", afterAd: done });
}
// Opt-in rewarded ad (ready for future "unlock"/bonus use). onReward fires only if fully viewed.
function showRewarded(name, onReward, onDone){
  onDone = onDone || function(){};
  if(!_adsReady){ onDone(false); return; }
  let granted = false;
  _adBreak({
    type: "reward", name: name || "reward",
    beforeReward(show){ show(); },
    adViewed(){ granted = true; if(onReward) onReward(); },
    adDismissed(){},
    afterAd(){ onDone(granted); }
  });
}

/* ===== Boot ===== */
function showSplash(){
  const sp = document.createElement("div");
  sp.className = "splash";
  sp.innerHTML = `${BRAND_MARK}<div class="sp-name">TalkFlip</div>`;
  root.appendChild(sp);
  setTimeout(() => { sp.classList.add("hide"); setTimeout(() => sp.remove(), 420); }, 780);
}

state.deckId = firstPlayableDeck();
let _onboarded = false;
try { _onboarded = !!localStorage.getItem(ONBOARD_KEY); } catch(e){}
if(_onboarded) renderSetup();
else renderOnboarding();
showSplash();
initAds();
</script>
